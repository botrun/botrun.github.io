      <div class=\"feature-card animate delay-1\">\n                    <div class=\"feature-icon\">\n                        <i class=\"fas fa-map-marker-alt\"></i>\n                    </div>\n                    <h3>多元景點</h3>\n                    <p>從東京塔到明治神宮，從新宿到浅草，東京擁有各式各樣的景點，滿足不同遊客的需求。</p>\n                </div>\n                <div class=\"feature-card animate delay-2\">\n                    <div class=\"feature-icon\">\n                        <i class=\"fas fa-utensils\"></i>\n                    </div>\n                    <h3>美食天堂</h3>\n                    <p>東京是世界美食之都，從壽司到拉麵，從壽司店到便利商店，每個角落都有美味等著你發現。</p>\n                </div>\n                <div class=\"feature-card animate delay-3\">\n                    <div class=\"feature-icon\">\n                        <i class=\"fas fa-money-bill-wave\"></i>\n                    </div>\n                    <h3>經濟實惠</h3>\n                    <p>東京提供多種價格的住宿、餐飲和交通選擇，讓不同預算的遊客都能享受東京之旅。</p>\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Main Content -->\n    <section class=\"main-content\">\n        <div class=\"container\">\n            <div class=\"content-grid\">\n                <!-- Sidebar -->\n                <aside class=\"sidebar animate delay-1\">\n                    <h3>東京旅遊目錄</h3>\n                    <ul>\n                        <li><a href=\"#must-see\">必去景點</a></li>\n                        <li><a href=\"#hidden-gems\">隱藏寶石</a></li>\n                        <li><a href=\"#food-guide\">美食指南</a></li>\n                        <li><a href=\"#transport\">交通指南</a></li>\n                        <li><a href=\"#seasonal\">季節活動</a></li>\n                        <li><a href=\"#budget\">預算規劃</a></li>\n                    </ul>\n                </aside>\n\n                <!-- Content -->\n                <main>\n                    <!-- Must See Attractions -->\n                    <section id=\"must-see\" class=\"content-section animate delay-2\">\n                        <h2>東京必去景點</h2>\n                        <p>這些景點是東京的代表，絕對不能錯過！</p>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>1. 橫濱 - 東京的門戶</h3>\n                            <img src=\"https://images.unsplash.com/photo-1568605114967-8130f3a36994?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"橫濱港\">\n                            <p>橫濱是東京的重要門戶，擁有著名的橫濱港、中華街和山手線。從橫濱出發，您可以輕鬆前往東京市區，同時也能體驗到不同的文化氛圍。</p>\n                            <ul>\n                                <li><strong>必去景點：</strong>橫濱港大鐘、中華街、山下公園</li>\n                                <li><strong>交通：</strong>JR橫濱站、橫濱地鐵</li>\n                                <li><strong>美食推薦：</strong>中華街的燒肉、拉麵</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>2. 新宿 - 現代東京的心臟</h3>\n                            <img src=\"https://images.unsplash.com/photo-1557804506-669a67965ba0?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"新宿夜景\">\n                            <p>新宿是東京的商業和娛樂中心，擁有著名的新宿站、歌舞伎町和新宿御苑。這裡是夜生活的熱點，同時也是購物和觀光的好去處。</p>\n                            <ul>\n                                <li><strong>必去景點：</strong>新宿站、歌舞伎町、新宿御苑、東京塔</li>\n                                <li><strong>交通：</strong>新宿站（JR、地鐵多條線路交匯）</li>\n                                <li><strong>美食推薦：</strong>新宿神樂坂的壽司、歌舞伎町的燒肉</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>3. 浅草 - 東京的傳統文化</h3>\n                            <img src=\"https://images.unsplash.com/photo-1558026392-4b8c58f5f602?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"浅草寺\">\n                            <p>浅草是東京最古老的地區之一，擁有著名的浅草寺和雷門。這裡保留了許多江戶時代的風貌，是體驗東京傳統文化的最佳地點。</p>\n                            <ul>\n                                <li><strong>必去景點：</strong>浅草寺、雷門、寶藏市場</li>\n                                <li><strong>交通：</strong>浅草站（東武鐵道、地鐵）</li>\n                                <li><strong>美食推薦：</strong>浅草的天婦羅、寶藏市場的小吃</li>\n                            </ul>\n                        </div>\n                    </section>\n\n                    <!-- Hidden Gems -->\n                    <section id=\"hidden-gems\" class=\"content-section animate delay-3\">\n                        <h2>東京隱藏寶石</h2>\n                        <p>這些地方可能不如主流景點知名，但卻有著獨特的魅力，值得您花時間探索。</p>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>1. 代代木公園 - 綠色綿延的休閒天堂</h3>\n                            <img src=\"https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"代代木公園\">\n                            <p>代代木公園是東京最大的都市公園之一，擁有廣闊的綠地、湖泊和運動設施。這裡是東京人休閒的好去處，也是舉辦大型活動的場地。</p>\n                            <ul>\n                                <li><strong>特色：</strong>日本武道館、代代木體育館、國立競技場</li>\n                                <li><strong>交通：</strong>代代木上原站、原宿站</li>\n                                <li><strong>季節活動：</strong>櫻花季、秋季紅葉</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>2. 小石川後樂園 - 歷史與自然的結合</h3>\n                            <img src=\"https://images.unsplash.com/photo-1579783902614-a3fb39278827?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"小石川後樂園\">\n                            <p>小石川後樂園是東京少數保留江戶時代風貌的庭園之一，擁有著名的櫻花樹和傳統建築。這裡是體驗東京歷史文化的絕佳場所。</p>\n                            <ul>\n                                <li><strong>特色：</strong>櫻花、傳統庭園、歷史建築</li>\n                                <li><strong>交通：</strong>後樂園站</li>\n                                <li><strong>開放時間：</strong>全年開放，櫻花季特別熱門</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>3. 表參道 - 時尚與歷史的融合</h3>\n                            <img src=\"https://images.unsplash.com/photo-1558026392-4b8c58f5f602?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"表參道\">\n                            <p>表參道是東京最時尚的街道之一，擁有許多高級商店、藝術畫廊和歷史建築。這裡是東京人購物和休閒的熱門地點。</p>\n                            <ul>\n                                <li><strong>特色：</strong>時尚購物、歷史建築、美術館</li>\n                                <li><strong>交通：</strong>表參道站、原宿站</li>\n                                <li><strong>推薦店家：</strong>三越百貨、原宿的時尚店鋪</li>\n                            </ul>\n                        </div>\n                    </section>\n                </main>\n            </div>\n        </div>\n    </section>\n\n    <!-- Food Guide -->\n    <section class=\"main-content\" id=\"food\">\n        <div class=\"container\">\n            <div class=\"content-grid\">\n                <aside class=\"sidebar animate delay-1\">\n                    <h3>東京美食分類</h3>\n                    <ul>\n                        <li><a href=\"#street-food\">街頭小吃</a></li>\n                        <li><a href=\"#traditional\">傳統美食</a></li>\n                        <li><a href=\"#modern\">現代創意</a></li>\n                        <li><a href=\"#cafes\">咖啡茶館</a></li>\n                        <li><a href=\"#desserts\">甜點</a></li>\n                        <li><a href=\"#drinks\">飲品</a></li>\n                    </ul>\n                </aside>\n\n                <main>\n                    <section id=\"street-food\" class=\"content-section animate delay-2\">\n                        <h2>東京街頭小吃</h2>\n                        <p>東京的街頭小吃種類繁多，價格親民，是體驗當地美食文化的最佳方式。</p>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>1. 天婦羅（天婦羅）</h3>\n                            <img src=\"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"天婦羅\">\n                            <p>天婦羅是日本的經典小吃，以魚或蔬菜為主要食材，蘸上特製的天婦羅醬。東京的浅草和新宿是品嚐天婦羅的熱門地點。</p>\n                            <ul>\n                                <li><strong>推薦店家：</strong>浅草的天婦羅專門店、新宿的天婦羅連鎖店</li>\n                                <li><strong>價格：</strong>¥500-¥1500</li>\n                                <li><strong>最佳時間：</strong>晚餐時間或夜間</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>2. 燒肉（焼肉）</h3>\n                            <img src=\"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"燒肉\">\n                            <p>燒肉是韓國和日本都很流行的美食，在東京有許多專門的燒肉店。您可以自己烤肉，享受新鮮的肉類和蔬菜。</p>\n                            <ul>\n                                <li><strong>推薦店家：</strong>歌舞伎町的燒肉店、新宿的韓國料理店</li>\n                                <li><strong>價格：</strong>¥2000-¥5000（人均）</li>\n                                <li><strong>最佳時間：</strong>晚餐時間</li>\n                            </ul>\n                        </div>\n\n                        <div style=\"margin: 40px 0;\">\n                            <h3>3. 便當（弁当）</h3>\n                            <img src=\"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80\" alt=\"便當\">\n                            <p>便當是日本人最喜愛的午餐選擇，東京的便當種類繁多，從簡單的三文治到精緻的高級便當應有盡有。便利商店的便當也是品嚐東京美食的好方法。</p>\n                            <ul>\n                                <li><strong>推薦店家：</strong>便利商店（FamilyMart、7-Eleven、Lawson）、專門便當店</li>\n                                <li><strong>價格：</strong>¥300-¥1500</li>\n                                <li><strong>最佳時間：</strong>午餐時間</li>\n                            </ul>\n                        </div>\n                    </section>\n                </main>\n            </div>\n        </div>\n    </section>\n\n    <!-- Travel Tips -->\n    <section class=\"travel-tips\" id=\"tips\">\n        <div class=\"container\">\n            <div class=\"section-title\">\n                <h2>東京旅遊秘技</h2>\n (108,99,255,0.2);\n          margin-top: 1rem;\n        }\n\n        .cta:hover {\n          transform: translateY(-2px);\n          box-shadow: 0 8px 24px rgba(108,99,255,0.3);\n          background: #5a4fff;\n        }\n\n        .pro-tip {\n          background: var(--c-surface-2);\n          border-left: 4px solid var(--c-accent);\n          padding: 1rem;\n          margin: 1.25rem 0;\n          border-radius: 0 8px 8px 0;\n        }\n\n        .pro-tip p {\n          margin: 0.5rem 0;\n          font-size: 0.9rem;\n        }\n\n        .features {\n          display: grid;\n          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));\n          gap: 2rem;\n          margin-top: 2rem;\n        }\n\n        .feature-item {\n          display: flex;\n          gap: 1rem;\n          align-items: flex-start;\n        }\n\n        .feature-icon {\n          font-size: 2rem;\n          flex-shrink: 0;\n          color: var(--c-accent);\n        }\n\n        .footer {\n          text-align: center;\n          padding: 3rem 2rem;\n          color: var(--c-text-dim);\n          font-size: 0.85rem;\n          border-top: 1px solid var(--c-border);\n        }\n\n        @media (max-width: 768px) {\n          .cards { grid-template-columns: 1fr; }\n          .features { grid-template-columns: 1fr; }\n          .hero { min-height: 60vh; padding: 3rem 1.5rem; }\n          .section { padding: 3rem 1.5rem; }\n          .hero h1 { font-size: clamp(2rem, 8vw, 3rem); }\n          .section-title { font-size: clamp(1.5rem, 5vw, 2.2rem); }\n        }\n\n        @keyframes fadeUp {\n          from { opacity: 0; transform: translateY(20px); }\n          to { opacity: 1; transform: translateY(0); }\n        }\n\n        .animate {\n          animation: fadeUp 0.6s ease-out both;\n          opacity: 0;\n        }\n\n        .delay-1 { animation-delay: 0.1s; }\n        .delay-2 { animation-delay: 0.2s; }\n        .delay-3 { animation-delay: 0.3s; }\n        .delay-4 { animation-delay: 0.4s; }\n\n        .persona-card {\n          background: linear-gradient(145deg, #1a1a2e, #16213e);\n          border: 1px solid rgba(108, 99, 255, 0.1);\n        }\n\n        .persona-card .card-emoji {\n          color: var(--c-accent);\n        }\n\n        .season-card {\n          background: linear-gradient(145deg, #1a1a2e, #0f3460);\n        }\n\n        .hidden-gem-card {\n          background: linear-gradient(145deg, #1a1a2e, #2d1b69);\n        }\n\n        .budget-item {\n          display: flex;\n          justify-content: space-between;\n          align-items: center;\n          padding: 0.75rem 0;\n          border-bottom: 1px solid var(--c-border);\n          color: var(--c-text);\n        }\n\n        .budget-price {\n          color: var(--c-gold);\n          font-weight: 600;\n          font-size: 1.05rem;\n        }\n\n        .budget-item:last-child {\n          border-bottom: none;\n        }\n\n        .section-title.highlight {\n          background: linear-gradient(135deg, #fff 30%, var(--c-accent));\n          -webkit-background-clip: text;\n          -webkit-text-fill-color: transparent;\n        }\n    </style>\n</head>\n<body>\n    <!-- Hero Section -->\n    <section class=\"hero\">\n        <h1 class=\"animate delay-1\">東京35區的秘密地圖</h1>\n        <p class=\"subtitle animate delay-2\">超越涉谷與原宿的真正東京體驗：<br>當地人最愛的隱藏寶藏與實用技巧</p>\n        <a href=\"#personas\" class=\"cta animate delay-3\">\n            🔍 找到我的東京人格\n        </a>\n    </section>\n\n    <!-- Introduction Section -->\n    <section class=\"section\" id=\"intro\">\n        <div class=\"animate delay-1\">\n            <h2 class=\"section-title highlight\">東京不只是涉谷與原宿</h2>\n            <p class=\"section-subtitle animate delay-2\">根據你的「東京人格」量身打造的35區行程</p>\n\n            <p class=\"animate delay-2\">東京有超過35個行政區，每個區都有獨特的歷史、美食和隱藏寶地。這份地圖不是給你人氣排行榜，而是根據你的興趣、預算和時間，為你精選東京人最愛的秘密基地。<span class=\"tag\">首次來訪</span><span class=\"tag\">再訪東京</span><span class=\"tag\">東京生活者</span></p>\n\n            <p class=\"animate delay-3\">我們整理了東京人日常生活中的「秘密基地」、雨季的「避難所」、以及如何像當地人一樣玩轉東京。不需要花費數萬日圓，也不需要排隊數小時——只需要這份地圖，就能體驗真正的東京生活方式。從神田川的野餐聖地到中野的二手家具市場，從六本木的地下藝術空間到品川的海邊溫泉，這裡有東京人最愛的35個秘密地點，絕對不在任何導遊手冊上！</p>\n        </div>\n    </section>\n\n    <!-- Persona Selection -->\n    <section class=\"section\" id=\"personas\">\n        <h2 class=\"section-title animate delay-1\">根據你的「東京人格」選擇行程</h2>\n        <p class=\"section-subtitle animate delay-2\">東京有無數面貌，哪一個是你的東京？</p>\n\n        <div class=\"cards\">\n            <!-- 首次來訪者 - 時尚達人 -->\n            <div class=\"card persona-card animate delay-3\">\n                <span class=\"card-emoji\">👗</span>\n                <h3>時尚達人</h3>\n                <p>超越原宿的時尚聖地：金澤町的二手服飾天堂（價格比原宿便宜30%）與KICHIJOJI的隱藏店鋪，以及東京人最愛的「東京人專用」咖啡廳「Café Kitsuné」的時尚攝影背景。<span class=\"tag\">時尚</span><span class=\"tag\">拍照</span><span class=\"tag\">隱藏店鋪</span></p>\n                <div class=\"pro-tip\">\n                    <p>💡 <strong>東京人的秘密：</strong>在金澤町的「RAKUTEN KIDZ」尋找限量版日本動漫服裝，價格比原宿便宜30%，而且店員會幫你包裝成「東京人專用」的禮盒。提示：週六早上8點開門，東京人會提前排隊！</p>\n                    <p>📍 <strong>必去地點：</strong></p>\n                    <ul>\n                        <li>🛍️ <strong>金澤町二手服飾街</strong>：從東京站步行15分鐘，或搭乘都營地下鐵新宿線到「神保町」站下車</li>\n                        <li>☕ <strong>Café Kitsuné</strong>：位於表參道，東京人最愛的時尚咖啡廳，點心價格在¥800-¥1,500</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 美食家 -->\n            <div class=\"card persona-card animate delay-3 delay-1\">\n                <span class=\"card-emoji\">🍜</span>\n                <h3>美食家</h3>\n                <p>東京人最愛的美食秘密：築地市場的「東京人專用」魚市場（早上6點開門，避開觀光客）、神田神保町的拉麵博物館（可以買到「拉麵套裝」回家自己做）、以及新宿西口的「お好み焼き街」（東京人最愛的小吃，但沒有人排隊）。<span class=\"tag\">美食</span><span class=\"tag\">當地人</span><span class=\"tag\">實用技巧</span></p>\n                <div class=\"pro-tip\">\n                    <p>💡 <strong>東京人的秘密：</strong>在神田神保町的「拉麵博物館」買一碗「拉麵套裝」（¥1,500），回家自己做！店員會教你「東京人專用」的拉麵技巧。提示：週二17:30後免費參觀博物館！</p>\n                    <p>📍 <strong>必去地點：</strong></p>\n                    <ul>\n                        <li>🐟 <strong>築地市場</strong>：早上6點開門，東京人會提前排隊買新鮮海鮮</li>\n                        <li>🍜 <strong>拉麵博物館</strong>：位於神田神保町，週二17:30後免費參觀</li>\n                        <li>🍢 <strong>新宿西口お好み焼き街</strong>：東京人最愛的小吃，價格在¥500-¥1,000/份</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 文化探索 -->\n            <div class=\"card persona-card animate delay-3 delay-2\">\n                <span class=\"card-emoji\">🏯</span>\n                <h3>文化探索</h3>\n                <p>東京最古老的文化遺跡：上野的國立博物館（週二17:30後免費）、後樂園的江戶風情（東京人最愛的櫻花季地點，但需要提前預約）、以及谷中古民家街（可以品嚐到價格便宜一半的和菓子）。<span class=\"tag\">歷史</span><span class=\"tag\">文化</span><span class=\"tag\">季節性</span></p>\n                <div class=\"pro-tip\">\n                    <p>💡 <strong>東京人的秘密：</strong>在谷中「古民家」的茶屋裡品嚐「和菓子」，價格比觀光景點便宜一半（¥300-¥600/份）。提示：週六早上8點開門，東京人會提前排隊！</p>\n                    <p>📍 <strong>必去地點：</strong></p>\n                    <ul>\n                        <li>🏯 <strong>上野國立博物館</strong>：週二17:30後免費參觀</li>\n                        <li>🌸 <strong>後樂園</strong>：東京人最愛的櫻花季地點，需要提前預約</li>\n                        <li>🏡 <strong>谷中古民家街</strong>：可以品嚐到價格便宜一半的和菓子</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 夜生活 -->\n            <div class=\"card persona-card animate delay-3 delay-3\">\n                <span class=\"card-emoji\">🌃</span>\n                <h3>夜生活</h3>\n                <p>東京人最愛的夜間體驗：六本木的藝術地下空間（需要提前預約）、新宿歌舞伎町的神秘酒吧（東京人專用的混音派對）、以及涉谷的「東京人專用」夜間市場（週五晚上8點開市）。<span class=\"tag\">夜間</span><span class=\"tag\">社交</span><span class=\"tag\">隱藏場所</span></p>\n                <div class=\"pro-tip\">\n                    <p>💡 <strong>東京人的秘密：</strong>在新宿的「Bar High Five」預約「東京人專屬」的混音派對（需提前一個月預約，門票¥5,000）。提示：派對開始前一小時到達，可以免費品嚐東京人最愛的「高級雞尾酒」！</p>\n                    <p>📍 <strong>必去地點：</strong></p>\n                    <ul>\n                        <li>🎨 <strong>六本木藝術地下空間</strong>：需要提前預約，門票¥3,000</li>\n                        <li>🍸 <strong>Bar High Five</strong>：東京人專用的混音派對，需提前一個月預約</li>\n                        <li>🛍️ <strong>涉谷夜間市場</strong>：週五晚上8點開市，東京人最愛的夜間購物地點</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 東京生活者 -->\n            <div class=\"card persona-card animate delay-3 delay-4\">\n                <span class=\"card-emoji\">🏠</span>\n                <h3>東京生活者</h3>\n                <p>東京人日常生活中的秘密基地：中野的二手家具市場（週六早上8點開門，可以買到價格便宜的家具）、池袋的地下商場（東京人最愛的拉麵店，但需要提前預約）、以及品川的海之公園（可以看到東京晴空塔，但沒有遊客）。<span class=\"tag\">生活實用</span><span class=\"tag\">當地人</span><span class=\"tag\">隱藏景點</span></p>\n                <div class=\"pro-tip\">\n                    <p>💡 <strong>東京人的秘密：</strong>在中野太陽廣場的二手家具市場買家具，週六早上8點開門，東京人會提前排隊。提示：家具價格在¥1,000-¥10,000/件，收藏品¥500-¥5,000/件！</p>\n                    <p>📍 <strong>必去地點：</strong></p>\n                    <ul>\n                        <li>🛋️ <strong>中野太陽廣場</strong>：週六早上8點開門，東京人最愛的二手家具市場</li>\n                        <li>🍜 <strong>池袋太陽廣場地下街</strong>：東京人最愛的拉麵店，需要提前預約</li>\n                        <li>🌊 <strong>品川海之公園</strong>：可以看到東京晴空塔，但沒有遊客</li>\n                    </ul>\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Hidden Gems -->\n    <section class=\"section\" id=\"hidden-gems\">\n        <h2 class=\"section-title animate delay-1\">東京人的「秘密基地」</h2>\n        <p class=\"section-subtitle animate delay-2\">不在導遊手冊上的10個地點，絕對不在任何旅遊網站上</p>\n\n        <div class=\"cards\">\n            <!-- 神田川河川敷 -->\n            <div class=\"card hidden-gem-card animate delay-3\">\n                <span class=\"card-emoji\">🌿</span>\n                <h3>神田川河川敷</h3>\n                <p>東京人週末露營、野餐的聖地。夏季可以租借「東京人專用」的野餐桌（價格僅¥1,000），還有隱藏的「東京人專用」烤肉區域。提示：週六晚上會有「東京人專用」的露營派對！<span class=\"tag\">戶外</span><span class=\"tag\">季節性</span><span class=\"tag\">社交</span></p>\n                <div class=\"pro-tip\">\n                    <p>📍 <strong>如何前往：</strong>從秋葉原站步行10分鐘，或搭乘都營地下鐵新宿線到「神保町」站下車。夏季會有「東京人專用」的野餐區域，但需要提前預約（週五晚上8點開始預約）。</p>\n                    <p>💰 <strong>預算：</strong></p>\n                    <ul>\n                        <li>野餐桌租借：¥1,000</li>\n                        <li>當地小吃：¥500-¥1,500/人</li>\n                        <li>隱藏烤肉區域：¥2,000/人（包含調味料）</li>\n                    </ul>\n                    <p>💡 <strong>東京人的秘密：</strong>在週六晚上8點到達，可以參加「東京人專用」的露營派對，免費品嚐東京人最愛的「野餐小吃」！</p>\n                </div>\n            </div>\n\n            <!-- 代官山山手 -->\n            <div class=\"card hidden-gem-card animate delay-3 delay-1\">\n                <span class=\"card-emoji\">🗼</span>\n                <h3>代官山山手</h3>\n                <p>免費的城市公園，可以看到東京塔全景，但沒有人排隊。東京人喜歡在這裡野餐或看日落，還有隱藏的「東京人專用」咖啡車。提示：傍晚6點到7點是最佳觀景時間！<span class=\"tag\">戶外</span><span class=\"tag\">免費</span><span class=\"tag\">景觀</span></p>\n                <div class=\"pro-tip\">\n                    <p>📍 <strong>如何前往：</strong>從代官山站步行5分鐘，或搭乘都營大江戶線到「代官山」站下車。最佳時間是傍晚6點到7點，可以看到東京塔的燈光秀。</p>\n                    <p>💡 <strong>東京人的秘密：</strong>在公園裡的「東京人專用」咖啡車「Café de L'Air」品嚐¥800的抹茶蛋糕，還可以免費參加「東京人專用」的日落攝影教學（週六晚上8點開始）。</p>\n                    <p>📸 <strong>拍照技巧：</strong></p>\n                    <ul>\n                        <li>使用「東京人專用」的攝影角度：從公園的西側拍攝東京塔，可以避開人群</li>\n                        <li>傍晚6點到7點是最佳拍攝時間，燈光秀開始前10分鐘開始拍攝</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 池袋太陽廣場地下街 -->\n            <div class=\"card hidden-gem-card animate delay-3 delay-2\">\n                <span class=\"card-emoji\">🛍️</span>\n                <h3>池袋太陽廣場地下街</h3>\n                <p>東京最大的地下商場，有「東京人最愛的拉麵店」排隊，但地下2樓的「東京人專用」餐廳幾乎沒有人。提示：地下2樓的「Ichiran」拉麵店需要提前預約，但地下3樓的「東京人專用」餐廳幾乎沒有人！<span class=\"tag\">美食</span><span class=\"tag\">購物</span><span class=\"tag\">隱藏場所</span></p>\n                <div class=\"pro-tip\">\n                    <p>📍 <strong>如何前往：</strong>從池袋站西口步行2分鐘。地下2樓的「東京人專用」餐廳「Ichiran」拉麵店，需要提前預約（官方網站預約）。</p>\n                    <p>💰 <strong>預算：</strong></p>\n                    <ul>\n                        <li>拉麵：¥1,000-¥1,500/碗</li>\n                        <li>地下街的小吃：¥300-¥800/份</li>\n                        <li>東京人專用餐廳：¥1,500-¥2,500/人</li>\n                    </ul>\n                    <p>💡 <strong>東京人的秘密：</strong>在地下3樓的「東京人專用」餐廳「Gonpachi」品嚐「東京人專用」的壽司套餐（¥2,500/人），幾乎沒有人知道這家店！</p>\n                </div>\n            </div>\n\n            <!-- 品川海之公園 -->\n            <div class=\"card hidden-gem-card animate delay-3 delay-3\">\n                <span class=\"card-emoji\">🌊</span>\n                <h3>品川海之公園</h3>\n                <p>東京灣的海邊公園，可以看到東京晴空塔，但沒有遊客。東京人喜歡在這裡看日出或日落，還有隱藏的「東京人專用」咖啡廳。提示：清晨6點到7點是最佳觀景時間！<span class=\"tag\">戶外</span><span class=\"tag\">景觀</span><span class=\"tag\">季節性</span></p>\n                <div class=\"pro-tip\">\n                    <p>📍 <strong>如何前往：</strong>從品川站步行15分鐘，或搭乘JR山手線到「品川」站下車。最佳時間是清晨6點到7點，可以看到東京灣的美景。</p>\n                    <p>💡 <strong>東京人的秘密：</strong>在公園裡的「東京人專用」咖啡廳「Café de L'Air」品嚐¥900的海鮮套餐，還可以免費參加「東京人專用」的日出攝影教學（週六早上6點開始）。</p>\n                    <p>📸 <strong>拍照技巧：</strong></p>\n                    <ul>\n                        <li>使用「東京人專用」的攝影角度：從公園的東側拍攝東京晴空塔，可以避開人群</li>\n                        <li>清晨6點到7點是最佳拍攝時間，日出前10分鐘開始拍攝</li>\n                        <li>使用「東京人專用」的攝影濾鏡：可以在咖啡廳免費借用</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 中野太陽廣場 -->\n            <div class=\"card hidden-gem-card animate delay-3 delay-4\">\n                <span class=\"card-emoji\">🛋️</span>\n                <h3>中野太陽廣場</h3>\n                <p>二手家具市場，東京人買家具的地方。週六早上8點開門可以找到價格便宜的家具和收藏品，還有隱藏的「東京人專用」家具修復店。提示：週六早上7點到達，可以排到最前面！<span class=\"tag\">購物</span><span class=\"tag\">收藏</span><span class=\"tag\">實用技巧</span></p>\n                <div class=\"pro-tip\">\n                    <p>📍 <strong>如何前往：</strong>從中野站步行5分鐘。週六早上8點開門，東京人會提前排隊。</p>\n                    <p>💰 <strong>預算：</strong></p>\n                    <ul>\n                        <li>家具：¥1,000-¥10,000/件</li>\n                        <li>收藏品：¥500-¥5,000/件</li>\n                        <li>東京人專用家具修復：¥2,000-¥5,000/件</li>\n                    </ul>\n                    <p>💡 <strong>東京人的秘密：</strong>在週六早上7點到達，可以排到最前面，還可以免費參加「東京人專用」的家具修復教學（8點開始）。</p>\n                    <p>🛠️ <strong>購物技巧：</strong></p>\n                    <ul>\n                        <li>使用「東京人專用」的議價技巧：說「東京人です！」（我是東京人！）可以議價20%</li>\n                        <li>週六早上8點開門前10分鐘開始排隊</li>\n                        <li>家具修復店位於地下1樓，幾乎沒有人知道</li>\n                    </ul>\n                </div>\n            </div>\n\n            <!-- 目黑川河川敷 -->\n            <div class=\"card hidden-gem-card animate delay-3 delay-5\">\n                <span class=\"card-emoji\">";
function writeIframe(id, html) {
  const f = document.getElementById(id);
  f.srcdoc = html;
}
writeIframe('frame-raw-split', rawHtml);
writeIframe('frame-opus-split', opusHtml);
writeIframe('frame-raw-single', rawHtml);

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
  document.getElementById('view-' + name).style.display = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}
