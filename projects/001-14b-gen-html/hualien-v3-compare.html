ax-width: 576px) {\n            .logo {\n                font-size: 2rem;\n            }\n\n            h1 {\n                font-size: 1.8rem;\n            }\n\n            .gallery {\n                grid-template-columns: 1fr;\n            }\n        }\n    </style>\n</head>\n<body>\n    <!-- Navigation -->\n    <nav>\n        <div class=\"nav-container\">\n            <a href=\"#\" class=\"nav-logo\">返鄉之旅 <span>Hualien</span></a>\n            <ul class=\"nav-links\">\n                <li><a href=\"#home\">首頁</a></li>\n                <li><a href=\"#about\">關於花蓮</a></li>\n                <li><a href=\"#journey\">返鄉之旅</a></li>\n                <li><a href=\"#gallery\">花蓮風光</a></li>\n                <li><a href=\"#testimonials\">遊客心得</a></li>\n                <li><a href=\"#contact\">聯絡我們</a></li>\n            </ul>\n            <div class=\"hamburger\">\n                <i class=\"fas fa-bars\"></i>\n            </div>\n        </div>\n    </nav>\n\n    <!-- Header -->\n    <header id=\"home\">\n        <div class=\"header-content\">\n            <div class=\"logo\">花蓮<span>Hualien</span></div>\n            <h1>返鄉之旅</h1>\n            <p>重返故鄉的美麗記憶，感受花蓮獨特的自然風光與濃厚的鄉土文化。從太魯閣的雄偉山嶽到秀姑巒溪的清澈水流，每一處都充滿了回憶與驚喜。讓我們一起探索這片神秘而美麗的土地，體驗真正的返鄉情懷。</p>\n            <a href=\"#journey\" class=\"btn\">開始旅程</a>\n        </div>\n    </header>\n\n    <!-- About Section -->\n    <section id=\"about\" class=\"about\">\n        <div class=\"container\">\n            <h2>關於花蓮</h2>\n            <div class=\"about-content\">\n                <div class=\"about-img\">\n                    <img src=\"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"花蓮風景\">\n                </div>\n                <div class=\"about-text\">\n                    <p>花蓮位於台灣東部，是一個充滿自然美景與文化魅力的地方。這裡有台灣最高的山峰玉山，壯麗的太魯閣國家公園，以及秀姑巒溪這條台灣最長的河流。花蓮不僅擁有豐富的自然資源，更有深厚的原住民文化，讓每一位遊客都能感受到這片土地的獨特魅力。</p>\n                    <p>作為一個返鄉的旅人，我們希望能夠透過這個網站，與您分享花蓮的美麗風光，以及我們在返鄉過程中收集的故事與經驗。讓我們一起回憶這片土地，並發現它新的面貌。</p>\n                    <a href=\"#journey\" class=\"btn\">開始返鄉之旅</a>\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Journey Section -->\n    <section id=\"journey\" class=\"journey\">\n        <div class=\"container\">\n            <h2>返鄉之旅</h2>\n            <div class=\"journey-item\">\n                <div class=\"journey-number\">01</div>\n                <div class=\"journey-content\">\n                    <h3>太魯閣國家公園</h3>\n                    <p>我們的旅程從太魯閣國家公園開始。這裡有台灣最壯麗的山嶽景觀，包括著名的花蓮關山隧道和秀姑巒溪的峽谷。我們沿著溪流步道漫步，感受大自然的氣息，並欣賞兩岸的奇岩異石和清澈的溪水。</p>\n                </div>\n                <div class=\"journey-image\">\n                    <img src=\"https://images.unsplash.com/photo-1605540436563-5bca919ae766?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"太魯閣國家公園\">\n                </div>\n            </div>\n\n            <div class=\"journey-item\">\n                <div class=\"journey-image\">\n                    <img src=\"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"花蓮市區\">\n                </div>\n                <div class=\"journey-content\">\n                    <h3>花蓮市區</h3>\n                    <p>來到花蓮市區，我們參觀了花蓮港的漁人碼頭，品嚐了當地的海鮮美食。花蓮市區有許多歷史建築和文化設施，如花蓮文創園區和花蓮港的燈塔。我們也造訪了花蓮縣立博物館，了解花蓮的歷史和文化。</p>\n                </div>\n                <div class=\"journey-number\">02</div>\n            </div>\n\n            <div class=\"journey-item\">\n                <div class=\"journey-number\">03</div>\n                <div class=\"journey-content\">\n                    <h3>玉山國家公園</h3>\n                    <p>前往玉山國家公園，我們登上了玉山主峰。雖然這是一個具有挑戰性的攀登，但站在台灣最高點，俯瞰整個島嶼的景色，讓我們感到無比的成就感和敬畏。玉山國家公園的生態系統也非常豐富，我們有機會看到許多珍貴的植物和動物。</p>\n                </div>\n                <div class=\"journey-image\">\n                    <img src=\"https://images.unsplash.com/photo-1605540436563-5bca919ae766?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"玉山國家公園\">\n                </div>\n            </div>\n\n            <div class=\"journey-item\">\n                <div class=\"journey-image\">\n                    <img src=\"https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"卓溪谷\">\n                </div>\n                <div class=\"journey-content\">\n                    <h3>卓溪谷</h3>\n                    <p>在卓溪谷，我們體驗了迷人的溪谷風光。這裡的步道沿著溪流蜿蜒而行，兩岸的綠樹和奇石為我們的旅程增添了無限風情。我們也參加了當地的原住民文化體驗活動，了解他們的生活方式和傳統手工藝。</p>\n                </div>\n                <div class=\"journey-number\">04</div>\n            </div>\n\n            <div class=\"journey-item\">\n                <div class=\"journey-number\">05</div>\n                <div class=\"journey-content\">\n                    <h3>光復老街</h3>\n                    <p>在返鄉之旅的最後一天，我們來到光復老街。這裡保留了許多日治時期的建築，散發著濃厚的歷史氛圍。我們品嚐了當地的特色小吃，如花蓮的牛肉麵和豆花，並購買了一些當地的特產作為紀念。這次返鄉之旅，不僅讓我們重溫了故鄉的美景，也讓我們更加熱愛這片土地。</p>\n                </div>\n                <div class=\"journey-image\">\n                    <img src=\"https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"光復老街\">\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Gallery Section -->\n    <section id=\"gallery\" class=\"gallery\">\n        <div class=\"container\">\n            <h2>花蓮風光</h2>\n            <div class=\"gallery\">\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"花蓮港\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">花蓮港</div>\n                    </div>\n                </div>\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1605540436563-5bca919ae766?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"太魯閣隧道\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">太魯閣隧道</div>\n                    </div>\n                </div>\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"卓溪谷風景\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">卓溪谷</div>\n                    </div>\n                </div>\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1600585154340-be6161a56a0c?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"玉山國家公園\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">玉山國家公園</div>\n                    </div>\n                </div>\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1605540436563-5bca919ae766?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"光復老街\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">光復老街</div>\n                    </div>\n                </div>\n                <div class=\"gallery-item\">\n                    <img src=\"https://images.unsplash.com/photo-1580489944761-15a19d654956?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80\" alt=\"花蓮夜景\">\n                    <div class=\"gallery-overlay\">\n                        <div class=\"gallery-caption\">花蓮夜景</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Testimonials Section -->\n    <section id=\"testimonials\" class=\"testimonials\">\n        <div class=\"container\">\n            <h2>遊客心得</h2>\n            <div class=\"testimonial\">\n                <div class=\"testimonial-text\">\n                    這次返鄉之旅讓我重新認識了花蓮的美麗。從太魯閣的雄偉山嶽到卓溪谷的迷人風光，每一處都讓我感到驚嘆。特別是玉山的登頂體驗，讓我終生難忘。花蓮不僅有自然的美景，更有濃厚的文化底蘊，讓我對這片土地有了更深的認識和熱愛。\n                </div>\n                <div class=\"testimonial-author\">\n                    <img src=\"https://randomuser.me/api/portraits/women/44.jpg\" alt=\"游客照片\" class=\"author-avatar\">\n                    <div class=\"author-info\">\n                        <h4>張小美</h4>\n                        <p>台北市民</p>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"testimonial\">\n                <div class=\"testimonial-text\">\n                    作為一個在花蓮長大的人，這次返鄉之旅讓我重新發現了故鄉的美。特別是光復老街的日治建築和當地的美食，讓我感受到濃厚的歷史氛圍和鄉土情懷。我們全家都非常享受這次的旅程，並計畫未來會更頻繁地回到花蓮。\n                </div>\n                <div class=\"testimonial-author\">\n                    <img src=\"https://randomuser.me/api/portraits/men/32.jpg\" alt=\"游客照片\" class=\"author-avatar\">\n                    <div class=\"author-info\">\n                        <h4>李大為</h4>\n                        <p>花蓮返鄉子女</p>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"testimonial\">\n                <div class=\"testimonial-text\">\n                    我們一家人從台北來到花蓮，參加了這次返鄉之旅。太魯閣的隧道和秀姑巒溪的風光讓我們感到非常驚豔。特別是當地的導遊，他們對花蓮的熱愛和深厚的知識讓我們受益匪淺。這次旅程不僅讓我們看到花蓮的美景，也讓我們了解了花蓮的歷史和文化。\n                </div>\n                <div class=\"testimonial-author\">\n                    <img src=\"https://randomuser.me/api/portraits/women/68.jpg\" alt=\"游客照片\" class=\"author-avatar\">\n                    <div class=\"author-info\">\n                        <h4>王小麗</h4>\n                        <p>台北家庭旅行</p>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </section>\n\n    <!-- Contact Section -->\n    <section id=\"contact\" class=\"contact\">\n        <div class=\"container\">\n            <h2>聯絡我們</h2>\n            <div class=\"contact-form\">\n                <form action=\"#\" method=\"POST\">\n                    <div class=\"form-group\">\n                        <label for=\"name\">姓名</label>\n                        <input type=\"text\" id=\"name\" name=\"name\" required>\n                    </div>\n                    <div class=\"form-group\">\n                        <label for=\"email\">電子郵件</label>\n                        <input type=\"email\" id=\"email\" name=\"email\" required>\n                    </div>\n                    <div class=\"form-group\">\n                        <label for=\"subject\">主題</label>\n                        <input type=\"text\" id=\"subject\" name=\"subject\" required>\n                    </div>\n                    <div class=\"form-group\">\n                        <label for=\"message\">訊息</label>\n                        <textarea id=\"message\" name=\"message\" required></textarea>\n                    </div>\n                    <button type=\"submit\" class=\"btn\">送出訊息</button>\n                </form>\n            </div>\n        </div>\n    </section>\n\n    <!-- Footer -->\n    <footer>\n        <div class=\"container\">\n            <div class=\"footer-content\">\n                <div class=\"footer-section\">\n                    <h3>花蓮返鄉之旅</h3>\n                    <p>重返故鄉的美麗記憶，感受花蓮獨特的自然風光與文化魅力。從太魯閣的雄偉山嶽到秀姑巒溪的清澈水流，每一處都充滿了回憶與驚喜。</p>\n                    <div class=\"social-links\">\n                        <a href=\"#\"><i class=\"fab fa", O="```html\n<!DOCTYPE html>\n<html lang=\"zh-Hant\" data-theme=\"light\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>花蓮，這個等你回家的地方</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n:root {\n  --c-bg: #faf8f5;\n  --c-surface: #fff;\n  --c-surface-2: #f5f0eb;\n  --c-border: rgba(0,0,0,0.06);\n  --c-text: #2a2018;\n  --c-text-dim: #7a6e60;\n  --c-accent: #d4522a;\n  --c-accent-glow: rgba(212,82,42,0.08);\n  --c-accent-border: rgba(212,82,42,0.2);\n  --c-warm-glow: rgba(212,82,42,0.05);\n  --c-title-gradient: linear-gradient(135deg, #2a2018 20%, #d4522a);\n  --font-display: 'Inter', system-ui, sans-serif;\n  --font-body: 'Inter', system-ui, sans-serif;\n  --radius-md: 16px;\n  --shadow-hover: 0 12px 40px rgba(212,82,42,0.1);\n  --card-height: 400px;\n}\n\n:root[data-theme=\"dark\"] {\n  --c-bg: #0a0a12;\n  --c-surface: #12121c;\n  --c-surface-2: #1a1a28;\n  --c-border: rgba(255,255,255,0.06);\n  --c-text: #eae8e4;\n  --c-text-dim: #8a8a9a;\n  --c-accent: #ff6b4a;\n  --c-accent-glow: rgba(255,107,74,0.12);\n  --c-accent-border: rgba(255,107,74,0.25);\n  --c-warm-glow: rgba(255,107,74,0.05);\n  --c-title-gradient: linear-gradient(135deg, #fff 20%, #ff6b4a);\n  --shadow-hover: 0 12px 40px rgba(255,107,74,0.12);\n}\n\n*, *::before, *::after {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nhtml {\n  scroll-behavior: smooth;\n}\n\nbody {\n  font-family: var(--font-body);\n  background: var(--c-bg);\n  color: var(--c-text);\n  line-height: 1.7;\n  -webkit-font-smoothing: antialiased;\n  transition: background 0.4s, color 0.4s;\n}\n\n/* ── 【改進 2】亮暗雙主題切換 ── */\n.theme-toggle {\n  position: fixed;\n  3rem;\n  text-align: center;\n}\n\n.section-title {\n  font-family: var(--font-display);\n  font-size: clamp(1.8rem, 4vw, 2.8rem);\n  font-weight: 700;\n  letter-spacing: -0.02em;\n  margin-bottom: 0.5rem;\n}\n\n.section-subtitle {\n  color: var(--c-text-dim);\n  font-size: 1.05rem;\n  max-width: 600px;\n  margin: 0 auto;\n}\n\n.cards {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));\n  gap: 2rem;\n}\n\n.card {\n  background: var(--c-surface);\n  border: 1px solid var(--c-border);\n  border-radius: var(--radius-md);\n  padding: 2rem;\n  transition: 0.3s cubic-bezier(0.4,0,0.2,1);\n  position: relative;\n  overflow: hidden;\n  height: var(--card-height);\n  display: flex;\n  flex-direction: column;\n}\n\n.card:hover {\n  transform: translateY(-4px);\n  box-shadow: var(--shadow-hover);\n  border-color: var(--c-accent-border);\n}\n\n.card-image-container {\n  position: relative;\n  margin-bottom: 1.5rem;\n  height: 180px;\n  overflow: hidden;\n  border-radius: 12px 12px 0 0;\n}\n\n.card-image {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  transition: transform 0.3s;\n}\n\n.card:hover .card-image {\n  transform: scale(1.05);\n}\n\n.card h3 {\n  font-size: 1.25rem;\n  font-weight: 600;\n  margin-bottom: 0.5rem;\n  line-height: 1.4;\n}\n\n.card p {\n  color: var(--c-text-dim);\n  font-size: 0.95rem;\n  line-height: 1.7;\n  flex-grow: 1;\n}\n\n.card .details {\n  margin-top: 1rem;\n  padding-top: 1rem;\n  border-top: 1px solid var(--c-border);\n  font-size: 0.9rem;\n  color: var(--c-text-dim);\n}\n\n.card .details ul {\n  padding-left: 1.2rem;\n  margin-top: 0.5rem;\n}\n\n.card .details li {\n  margin-bottom: 0.3rem;\n}\n\n.tag {\n  display: inline-block;\n  padding: 0.25rem 0.75rem;\n  background: var(--c-accent-glow);\n  color: var(--c-accent);\n  border-radius: 999px;\n  font-size: 0.8rem;\n  font-weight: 500;\n  margin: 0.5rem 0 0;\n  align-self: flex-start;\n}\n\n.cta {\n  display: inline-flex;\n  align-items: center;\n  gap: 0.5rem;\n  padding: 0.9rem 2rem;\n  background: var(--c-accent);\n  color: #fff;\n  border: none;\n  border-radius: 8px;\n  font-size: 1rem;\n  font-weight: 600;\n  cursor: pointer;\n  transition: 0.3s;\n  text-decoration: none;\n  margin-top: 1rem;\n}\n\n.cta:hover {\n  transform: translateY(-2px);\n  box-shadow: 0 8px 24px var(--c-accent-glow);\n}\n\n.cta-outline {\n  background: transparent;\n  border: 2px solid var(--c-accent);\n  color: var(--c-accent);\n}\n\n.cta-outline:hover {\n  background: var(--c-accent-glow);\n}\n\n.features {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));\n  gap: 2rem;\n  margin-top: 2rem;\n}\n\n.feature-item {\n  display: flex;\n  gap: 1rem;\n  align-items: flex-start;\n}\n\n.feature-icon {\n  font-size: 1.8rem;\n  flex-shrink: 0;\n}\n\n.highlight-box {\n  background: var(--c-surface-2);\n  border-left: 4px solid var(--c-accent);\n  border-radius: 0 var(--radius-md) var(--radius-md) 0;\n  padding: 1.5rem 2rem;\n  margin: 2rem 0;\n}\n\n.footer {\n  text-align: center;\n  padding: 3rem 2rem;\n  color: var(--c-text-dim);\n  font-size: 0.85rem;\n  border-top: 1px solid var(--c-border);\n}\n\n@media (max-width: 768px) {\n  .cards {\n    grid-template-columns: 1fr;\n  }\n  .features {\n    grid-template-columns: 1fr;\n  }\n  .hero {\n    min-height: 60vh;\n    padding: 3rem 1.5rem;\n  }\n  .section {\n    padding: 3rem 1.5rem;\n  }\n  .section-title {\n    font-size: clamp(1.5rem, 5vw, 2.2rem);\n  }\n}\n\n@keyframes fadeUp {\n  from { opacity: 0; transform: translateY(30px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n.animate {\n  animation: fadeUp 0.6s ease-out both;\n}\n\n.delay-1 { animation-delay: 0.1s; }\n.delay-2 { animation-delay: 0.2s; }\n.delay-3 { animation-delay: 0.3s; }\n.delay-4 { animation-delay: 0.4s; }\n</style>\n</head>\n<body>\n<button class=\"theme-toggle\" aria-label=\"切換主題\">🌙</button>\n\n<div class=\"hero animate\">\n  <div class=\"hero-content\">\n    <h1>花蓮，這個等你回家的地方</h1>\n    <p class=\"subtitle\">火車進站的汽笛聲、海風裡的鹹味，還有奶奶包的紅糖芋頭，都在等你回來</p>\n    <div class=\"cta-group\">\n      <a href=\"#section-1\" class=\"cta\">開始返鄉之旅</a>\n      <a href=\"#section-2\" class=\"cta cta-outline\">查看行程建議</a>\n    </div>\n  </div>\n</div>\n\n<section class=\"section animate delay-1\" id=\"section-1\">\n  <div class=\"section-header\">\n    <h2 class=\"section-title\">「回家」的火車票上，寫著你的名字</h2>\n    <p class=\"section-subtitle\">車窗外，太平洋的波浪拍打著玻璃，像是有人在對你說：「快回來！」</p>\n  </div>\n\n  <div class=\"cards\">\n    <!-- 第一張卡片 -->\n    <div class=\"card animate delay-2\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮火車站紅糖芋頭,花蓮特產,溫暖手工\" alt=\"奶奶包裹紅糖芋頭的手，溫暖的手工包裝散發著花蓮特有的香氣\" class=\"card-image\">\n      </div>\n      <h3>奶奶的紅糖芋頭，包裹著回家的味道</h3>\n      <p>還記得奶奶在花蓮車站塞進你包包的東西嗎？紅糖包裹的芋頭，外面還用紅線綁著，像是小小的禮物。她說：「這是花蓮的味道，吃一口就知道回家了。」車廂裡的空調吹不走那股溫熱，每一口都像是她在車窗外對你說：「快點回來。」</p>\n      <div class=\"details\">\n        <ul>\n          <li>紅糖芋頭在花蓮太魯閣很常見，當地的「阿美族手工藝館」是個好地方，地址在太魯閣鎮中山路1號，離火車站走路大概10分鐘。</li>\n          <li>紅糖芋頭的價格約新台幣150-200元一包，包裝簡單但很有手工感，奶奶那種包裹得緊緊的，吃起來特別好吃。</li>\n          <li>最好在秋冬季節買，因為芋頭收成的時候糖分最高，而且紅糖的香氣也更濃郁。如果想買更多，花蓮的「農產品市場」也有賣，但手工藝館的更有溫度。</li>\n        </ul>\n      </div>\n      <div class=\"tag\">溫暖</div>\n    </div>\n\n    <!-- 第二張卡片 -->\n    <div class=\"card animate delay-3\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮火車車廂,懷舊歌曲,金屬車廂\" alt=\"火車車廂內，有人低聲唱著《花蓮的天》，車窗外是模糊的山影\" class=\"card-image\">\n      </div>\n      <h3>車廂裡的《花蓮的天》，唱給你聽的</h3>\n      <p>有人在唱歌了，聲音低沉但清晰，像是《花蓮的天》的旋律在金屬車廂裡回盪。你抬頭一看，是個陌生的阿伯，手裡拿著一張泛黃的紙，唱著：「花蓮的天，花蓮的雨……」歌聲在車廂裡顫抖，讓你突然想起小時候在花蓮的夜晚，窗外的雨聲和這首歌混在一起。有人递給你一張紙巾，上面寫著：「唱給你聽的。」</p>\n      <div class=\"tag\">懷舊</div>\n    </div>\n\n    <!-- 第三張卡片 -->\n    <div class=\"card animate delay-4\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?太魯閣山脈,車窗外風景,故鄉手掌\" alt=\"火車窗外，太魯閣山脈的山影層層疊疊，像是故鄉的手掌在等待\" class=\"card-image\">\n      </div>\n      <h3>山影疊疊，像是故鄉的手</h3>\n      <p>遠方的山影越來越近，一層層疊起來，像是故鄉的手掌，等著你回握。太魯閣的山脈在車窗外變得清晰，你突然想起小時候和爸在山上摘野果的日子。火車越過隧道，山影在車窗上跳動，像是有人在對你說：「我們在等你。」手機信號一閃一閃，短信提示：「火車快到花蓮了，我們在月台等你。」</p>\n      <div class=\"tag\">回家</div>\n    </div>\n  </div>\n</section>\n\n<section class=\"section animate delay-1\" id=\"section-2\">\n  <div class=\"section-header\">\n    <h2 class=\"section-title\">下車的瞬間，海風就把你的記憶吹醒了</h2>\n    <p class=\"section-subtitle\">空氣裡有鹹鹹的味道，像是童年時候在海邊吃的鹹酥雞，又甜又咸</p>\n  </div>\n\n  <div class=\"cards\">\n    <!-- 卡片1：機車接送 -->\n    <div class=\"card animate delay-2\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮機車接送,花蓮火車站,花蓮老舊機車\" alt=\"花蓮火車站前，機車車主笑著遞出雨傘和米粉\" class=\"card-image\">\n      </div>\n      <h3>火車站前的「嗚嗚」聲，是回家的第一聲</h3>\n      <p>下了火車，站在花蓮站前，一輛老舊機車「嗚嗚」一聲停在你面前，車主大叔笑著說：「我送你去！」車籃裡還放著一把雨傘（萬一下雨）和一包花蓮米粉（萬一餓了）。那種熟悉的味道，讓你突然想起小學時候放學後，媽媽在車站等你的場景。車子開得不快，但每一段路都像是慢動作，讓你有時間回憶每一個轉彎背後的故事。大叔說：「花蓮的路不急，你也別急。」</p>\n      <div class=\"tag\">機車接送</div>\n    </div>\n\n    <!-- 卡片2：油煎香蕉攤 -->\n    <div class=\"card animate delay-3\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮夜市,油煎香蕉,花蓮小吃攤\" alt=\"花蓮夜市小吃攤，香氣四溢的油煎香蕉\" class=\"card-image\">\n      </div>\n      <h3>油煎香蕉的香氣，讓我想起大媽的笑容</h3>\n      <p>走在夜市的小巷子，油煎香蕉的香氣就直衝鼻子，讓你忍不住停下腳步。攤主大媽一看到你，就笑著說：「又胖了，多吃點！」她手裡的鐵叉「滋滋」作響，香蕉片金黃酥脆，夾著花生粉和芋頭粉，一口下去甜甜的、香香的，還帶點鹹味。她說這是她兒子小學時候最愛吃的，現在她兒子在台中上班，但每次回來都要吃一大碗。你突然覺得，這個小吃攤不只是賣食物，而是賣著一個個家庭的回憶。大媽還給你一個小紙袋，說：「帶點回去給你媽媽吃。」</p>\n      <div class=\"details\">\n        <ul>\n          <li>攤位在**光復路夜市**靠近**花蓮火車站**的巷子裡，晚上7點左右就開始排隊了（夏天更早，因為人多）</li>\n          <li>香蕉阿姨的秘密是用**花生醬和辣椒醬**混合的特製醬料，她會自己調配，味道又甜又辣又有嚼勁</li>\n          <li>她家的香蕉是從**玉里**買來的，每次我問她為什麼不換攤位，她就說「這裡的客人熟，不用多說話」，所以每次我都會跟她聊半小時以上（她還會推薦她家的**芋圓湯**，新台幣50元一碗，超值）</li>\n          <li>最好在**秋冬季**去，因為香蕉阿姨會用**紅糖和花生粉**多做幾種口味，而且夜市人潮不會太擠（夏天太熱，她會減少量）</li>\n        </ul>\n      </div>\n      <div class=\"tag\">花蓮夜市</div>\n    </div>\n\n    <!-- 卡片3：海邊的石頭 -->\n    <div class=\"card animate delay-4\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮瑞穗海邊,光滑石頭,花蓮海岸\" alt=\"花蓮瑞穗海邊被海水打磨光滑的石頭，手指輕觸的瞬間\" class=\"card-image\">\n      </div>\n      <h3>海邊的石頭，像是童年時候的手掌</h3>\n      <p>到了海邊，你會忍不住走到岸邊，撿起那些被海水打磨得光滑的石頭。手指輕輕一摸，石頭的溫度剛好，像是童年時候在沙灘上玩耍時，手指不小心被太陽曬紅的感覺。石頭上還有海蝦的痕跡，讓你想起小學時候和朋友一起撿貝殼、追海蝦的日子。海風吹來，帶著鹹鹹的味道，讓你突然想起媽媽在海邊給你買的鹹酥雞，又甜又咸，一口下去就能嚐到童年的味道。你坐在石頭上，看著海浪一波一波地拍打岸邊，突然覺得時間好像停止了一樣。遠處，一個小男孩也在撿石頭，你忍不住對他說：「這些石頭，都是花蓮的記憶。」</p>\n      <div class=\"details\">\n        <ul>\n          <li>**瑞穗沙灘**的海岸線是最容易找到這種被海水打磨光滑的石頭的地方，特別是靠近海邊的岩石區，隨手可得。</li>\n          <li>夏季（6-9月）是最好的時候去，海風涼爽，石頭上還可能有海水的鹹味，更能感受到海洋的氣息。</li>\n          <li>如果想要更特別的石頭，可以去當地的**瑞穗漁港**附近，漁民們有時會把一些特別的石頭或貝殼放在岸邊，價格從幾十元到幾百元不等（視大小和稀有度而定）。</li>\n        </ul>\n      </div>\n      <div class=\"tag\">花蓮海岸</div>\n    </div>\n  </div>\n</section>\n\n<section class=\"section animate delay-3\" id=\"section-3\">\n  <div class=\"section-header\">\n    <h2 class=\"section-title\">故鄉的夜晚，星星比城市裡多很多</h2>\n    <p class=\"section-subtitle\">坐在海邊的石階上，你數著星星，發現它們比你記憶中的還要亮，還要近，似乎在對你說：「我們一直在這裡等你。」</p>\n  </div>\n\n  <div class=\"cards\">\n    <!-- 卡片 1 -->\n    <div class=\"card animate delay-2\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮夜市甜點,花蓮水果,奶油甜點\" alt=\"花蓮夜市的甜點攤位，燈光溫暖，水果和奶油的甜點擺滿桌上\" class=\"card-image\">\n      </div>\n      <h3>夜市裡的「芒果鳳梨奶油」甜點，吃起來像童年</h3>\n      <p>花蓮的夜市裡，有一家小攤位專賣用當地芒果、鳳梨和奶油做成的甜點，外皮軟軟的，裡面滿滿的果肉，一口下去就能聞到海風的味道。攤主說這是他媽媽的秘方，每晚只做幾份，常常還沒到你手上就被搶光了。你當時買了兩份，一份給自己，一份給坐在旁邊的姑姑。她吃了一口就說：「這味道，我小學時在學校食堂吃過。」攤主笑著說：「這裡的每一份，都是為了讓你們回來吃的。」</p>\n      <div class=\"tag\">夜市美食</div>\n    </div>\n\n    <!-- 卡片 2 -->\n    <div class=\"card animate delay-3\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮瑞穗海邊釣魚,夕陽,父子釣魚\" alt=\"夕陽下的瑞穗海邊，父子倆坐在石階上，釣竿輕輕搖晃，海風拂面\" class=\"card-image\">\n      </div>\n      <h3>海風裡的童年回憶，爸爸說的「海有多寬」</h3>\n      <p>你們坐在瑞穗沙灘的石階上，腳邊是溫暖的海水，爸爸說：「等你長大了，就知道這海有多寬。」當時你覺得他只是隨口說說，但現在站在這裡，你才明白他當時的意思。海風帶著鹹鹹的味道，讓你想起小時候和他一起釣魚的時候，你總是不耐煩，他卻能坐一整晚，只為了看魚咬鉤的瞬間。現在，你坐在同一個地方，手裡拿著他當年用過的釣竿，試著體會他當時的心情。不過，你還是沒有他那樣的耐心，五分鐘就想放棄了。爸爸突然出現在你身後，笑著說：「我們不急，海也不急。」</p>\n      <div class=\"tag\">父子時光</div>\n    </div>\n\n    <!-- 卡片 3 -->\n    <div class=\"card animate delay-4\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮夜晚燈火,海邊小鎮,故鄉夜景\" alt=\"花蓮夜晚的海邊小鎮，燈火點點，遠處的山影模糊，海風輕拂\" class=\"card-image\">\n      </div>\n      <h3>燈火裡的故鄉，像在等你回家</h3>\n      <p>夜深了，遠處的燈火一盞盞亮起來，像是故鄉的人們在等你回家。你走在熟悉的小巷子裡，路燈下的陰影拉得好長，讓你想起小時候放學回家的路。突然，你聞到熟悉的味道— 可能是隔壁阿姨家的炒米粉，或者是街角的豆漿店。這些小小的細節，讓你覺得這裡的每一個角落都在等你。你停下腳步，看著遠處的燈火，突然有點想哭，但又不想讓自己哭出來。於是，你深深吸了一口海風，對著夜空說：「我回來了。」</p>\n      <div class=\"tag\">故鄉溫暖</div>\n    </div>\n  </div>\n</section>\n\n<section class=\"section animate delay-1\" id=\"section-4\">\n  <div class=\"section-header\">\n    <h2 class=\"section-title\">第二天清晨，太陽從海裡冒出來，像是為你準備的早餐</h2>\n    <p class=\"section-subtitle\">你站在海邊，看著太陽一點一點染紅天空，心裡突然有種說不出的安心，像是回到了童年時候的每一個清晨。</p>\n  </div>\n\n  <div class=\"cards\">\n    <!-- 卡片1 -->\n    <div class=\"card animate delay-2\">\n      <div class=\"card-image-container\">\n        <img src=\"https://source.unsplash.com/640x400/?花蓮魚丸早餐,海邊攤位,花蓮港\" alt=\"花蓮港早餐攤的魚丸香氣四溢，海風中夾雜著魚油和麵粉的味道\" class=\"card-image\">\n      </div>\n      <h3>花蓮港的魚丸早餐，像是回到童年</h3>\n      <p>清晨五點半，花蓮港的早餐攤就開始忙碌了。攤販阿伯的魚丸，外皮金黃酥脆，裡面的魚肉軟嫩，夾著一口豆芽菜，配上熱騰騰的豆漿，一口下去就能聞到海的味道。你突然想起小時候和媽媽一起在花蓮港的早餐攤吃這個，當時媽媽總說：「這才是真正的早餐！」阿伯笑著說：「你媽媽每次來都點這個，說你最愛吃。」你忍不住買了兩份，一份給自己，一份給隔壁的小朋友，他正好也在等早餐。阿伯說：「這就是花蓮的味道，分享給別人，就會變得更好吃。」</p>\n      <div class=\"details\">\n        <ul>\n          <li>地點：光復路海邊攤子（阿玉媽媽的魚丸攤），從花蓮火車站走路約15分鐘，或搭公車到「光復路口」站下即可。</li>\n          <li>時間：攤子從早上五點開始營業，最好趕在七點前去，人少味道更鮮。</li>\n          <li>季節：夏天來吃最舒服，海風吹著，魚丸配上冰鎮的花蓮茶（新台幣20元一杯）超級解暑。冬天也可以，但會多一層溫暖的感覺。</li>\n          <li>秘訣：阿伯會問你「要加點辣油嗎？」我每次都點，因為他家的辣油是自製的，用花蓮的辣椒和芝麻醬調的，超級好吃。</li>\n          <li>其他推薦：旁邊的「阿強的鹹酥雞」也很出名，一份新台幣120元，但要趕快吃，因為攤子早上八點就收攤了。</li>";
